<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gyakorlatias Angol — British vs American Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Patrick+Hand&display=swap" rel="stylesheet">
  <style>
    html,body{margin:0;padding:0;width:100%;background:#FAF8F3;}
    *{box-sizing:border-box;}
    .page{background:#FAF8F3;font-family:"Nunito",sans-serif;width:100%;max-width:680px;margin:0 auto;min-height:100vh;}
    .hero{background:#E8724A;padding:clamp(.9rem,3.5vw,1.8rem) clamp(.8rem,3vw,1.4rem);text-align:center;}
    .logo-top{font-family:"Patrick Hand",cursive;font-size:clamp(10px,2.5vw,16px);letter-spacing:.25em;color:rgba(255,255,255,.92);text-transform:uppercase;margin-bottom:6px;}
    .logo-letters{display:flex;justify-content:center;gap:clamp(4px,1.2vw,8px);margin-bottom:8px;}
    .ll{width:clamp(34px,8vw,54px);height:clamp(38px,9vw,60px);border-radius:clamp(8px,2vw,14px);border:2.5px solid rgba(255,255,255,.45);display:flex;align-items:center;justify-content:center;font-family:"Patrick Hand",cursive;font-size:clamp(20px,5vw,32px);color:#fff;font-weight:700;flex-shrink:0;}
    .ll-A{background:#C0436E;}.ll-N{background:#2D3E9E;}.ll-G{background:#1a6b3a;}.ll-O{background:#A86810;}.ll-L{background:#1255A0;}
    .hero-sub{font-family:"Patrick Hand",cursive;font-size:clamp(11px,2.8vw,17px);color:#fff;font-style:italic;}
    .flag-strip{height:5px;display:flex;}
    .fs1{flex:1;background:#CF142B;}.fs2{flex:1;background:#fff;}.fs3{flex:1;background:#003087;}.fs4{flex:1;background:#fff;}.fs5{flex:1;background:#CF142B;}
    .vs-row{display:flex;align-items:center;justify-content:center;gap:clamp(6px,2vw,16px);padding:clamp(.5rem,1.8vw,1rem) .8rem;background:#1a3a6b;flex-wrap:wrap;}
    .flag-badge{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.35);border-radius:10px;padding:4px 12px;}
    .flag-emoji{font-size:clamp(15px,4vw,24px);}
    .flag-word{font-family:"Patrick Hand",cursive;font-size:clamp(13px,3vw,20px);color:#fff;}
    .vs-badge{font-family:"Patrick Hand",cursive;font-size:clamp(15px,4vw,24px);color:#FFD700;font-weight:900;}
    .body{padding:clamp(.8rem,2.5vw,1.3rem);}
    .prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
    .prog-lbl{font-size:clamp(10px,2.2vw,13px);font-weight:700;color:#B8896E;}
    .prog-track{height:7px;background:#EDE8DE;border-radius:7px;overflow:hidden;margin-bottom:clamp(.8rem,2.5vw,1.2rem);}
    .prog-fill{height:100%;border-radius:7px;transition:width .5s ease;}
    .q-card{border-radius:clamp(12px,2.5vw,20px);border:2px solid;padding:clamp(.85rem,2.5vw,1.5rem);margin-bottom:.7rem;}
    .q-header{display:flex;align-items:center;gap:7px;margin-bottom:9px;flex-wrap:wrap;}
    .q-tag{font-family:"Patrick Hand",cursive;font-size:clamp(10px,2.2vw,13px);border:1.5px solid;border-radius:20px;padding:2px 10px;display:inline-block;}
    .q-mode-badge{font-family:"Patrick Hand",cursive;font-size:clamp(10px,2.2vw,13px);border-radius:20px;padding:2px 10px;display:inline-flex;align-items:center;gap:3px;color:#fff;}
    .q-prompt{font-size:clamp(10px,2vw,12px);font-weight:700;color:#999;margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em;}
    .q-word-box{display:inline-flex;align-items:center;gap:7px;background:#fff;border:2px solid;border-radius:12px;padding:clamp(6px,1.8vw,12px) clamp(10px,2.5vw,20px);margin-bottom:clamp(.7rem,2vw,1.1rem);}
    .q-flag{font-size:clamp(16px,3.5vw,24px);}
    .q-word{font-family:"Patrick Hand",cursive;font-size:clamp(18px,4.5vw,28px);font-weight:700;}
    .speak-btn{background:none;border:none;cursor:pointer;font-size:clamp(20px,4.5vw,26px);padding:4px 6px;line-height:1;display:inline-flex;align-items:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
    .speak-btn:active{transform:scale(1.3);}
    .q-ask{font-size:clamp(13px,2.8vw,16px);font-weight:800;color:#3D2B1F;margin-bottom:clamp(.6rem,2vw,1rem);}
    .opts{display:grid;grid-template-columns:1fr 1fr;gap:clamp(6px,1.5vw,9px);}
    .opt{display:flex;align-items:center;gap:clamp(6px,1.5vw,11px);padding:clamp(9px,2vw,12px) clamp(8px,2vw,14px);border-radius:clamp(9px,2vw,13px);border:2px solid;cursor:pointer;font-size:clamp(13px,2.6vw,16px);font-weight:800;color:#3D2B1F;transition:transform .13s,background .2s;width:100%;text-align:left;-webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:48px;}
    .opt:hover:not(:disabled){transform:translateX(3px);}
    .opt:active:not(:disabled){transform:scale(.96);}
    .opt-key{font-family:"Patrick Hand",cursive;font-size:clamp(12px,2.2vw,15px);width:clamp(24px,5vw,31px);height:clamp(24px,5vw,31px);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,color .2s;}
    .opt.correct-answer{background:#1D9E75!important;border-color:#0F6E56!important;color:#fff!important;}
    .opt.correct-answer .opt-key{background:#0F6E56!important;color:#fff!important;}
    .opt.wrong-answer{background:#FFF0EE;border-color:#E8724A;color:#993C1D;}
    .opt.wrong-answer .opt-key{background:#E8724A;color:#fff;}
    .fb{font-size:clamp(11px,2.2vw,13px);margin-top:9px;padding:8px 12px;border-radius:0 10px 10px 0;display:none;line-height:1.55;font-weight:700;}
    .fb.show{display:block;}
    .fb.ok{background:#E1F5EE;color:#085041;border-left:3px solid #1D9E75;}
    .fb.err{background:#FFF0EE;color:#993C1D;border-left:3px solid #E8724A;}
    .fb-speak{display:inline-flex;align-items:center;gap:6px;margin-top:8px;border-radius:22px;padding:8px 16px;cursor:pointer;font-family:"Nunito",sans-serif;font-size:clamp(12px,2.4vw,14px);font-weight:800;border:none;min-height:44px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
    .fb-speak:active{opacity:.7;}
    .fb-speak.ok-speak{background:#1D9E75;color:#fff;}
    .fb-speak.err-speak{background:#E8724A;color:#fff;}
    .nxt-row{display:flex;justify-content:flex-end;margin-top:.75rem;}
    .nxt-btn{font-family:"Patrick Hand",cursive;font-size:clamp(14px,3vw,18px);padding:clamp(9px,2vw,12px) clamp(18px,4vw,28px);color:#fff;border:none;border-radius:11px;cursor:pointer;display:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:48px;transition:opacity .15s;}
    .nxt-btn:active{opacity:.75;}
    .score-wrap{padding:clamp(.8rem,2.5vw,1.5rem) 0;}
    .score-banner{border-radius:clamp(14px,3vw,20px);padding:clamp(1rem,3.5vw,2rem) clamp(.9rem,3vw,1.5rem);border:3px solid;}
    .score-flags{font-size:clamp(22px,6vw,38px);margin-bottom:.4rem;letter-spacing:5px;text-align:center;}
    .score-headline{font-family:"Patrick Hand",cursive;font-size:clamp(20px,5.5vw,36px);color:#fff;text-align:center;margin-bottom:.2rem;line-height:1.2;}
    .score-subhead{font-family:"Patrick Hand",cursive;font-size:clamp(13px,3.2vw,20px);color:rgba(255,255,255,.92);text-align:center;margin-bottom:.8rem;line-height:1.3;}
    .score-stars{display:flex;justify-content:center;gap:clamp(3px,1.2vw,8px);margin-bottom:.8rem;}
    .star{width:clamp(22px,6vw,36px);height:clamp(22px,6vw,36px);}
    .score-ring{width:clamp(82px,20vw,110px);height:clamp(82px,20vw,110px);border-radius:50%;border:4px solid #fff;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto .9rem;background:rgba(255,255,255,.18);}
    .score-big{font-family:"Patrick Hand",cursive;font-size:clamp(30px,8vw,44px);line-height:1;color:#fff;}
    .score-of{font-size:clamp(11px,2.2vw,14px);color:rgba(255,255,255,.85);font-weight:700;}
    .praise-box{background:rgba(255,255,255,.93);border-radius:12px;padding:clamp(.75rem,2.5vw,1.2rem);margin-bottom:.75rem;}
    .praise-line{font-size:clamp(12px,2.5vw,15px);font-weight:800;color:#3D2B1F;line-height:1.65;padding-left:22px;position:relative;margin-bottom:5px;}
    .praise-line:before{content:"★";position:absolute;left:0;color:#E8724A;font-size:13px;}
    .score-nudge{font-family:"Patrick Hand",cursive;font-size:clamp(13px,3vw,18px);color:#fff;text-align:center;margin-bottom:1rem;line-height:1.4;padding:0 .4rem;}
    .restart{font-family:"Patrick Hand",cursive;font-size:clamp(14px,3.5vw,20px);padding:clamp(10px,2.5vw,14px) clamp(22px,5vw,40px);color:#fff;border:2.5px solid rgba(255,255,255,.5);border-radius:13px;cursor:pointer;background:rgba(255,255,255,.25);display:block;margin:0 auto;-webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:48px;transition:opacity .15s;}
    .restart:active{opacity:.75;}
    @media(max-width:340px){.opts{grid-template-columns:1fr;}.flag-badge{padding:3px 8px;}}
  </style>
</head>

  <div class="hero">
    <div class="logo-top">Gyakorlatias</div>
    <div class="logo-letters">
      <div class="ll ll-A">A</div><div class="ll ll-N">N</div><div class="ll ll-G">G</div><div class="ll ll-O">O</div><div class="ll ll-L">L</div>

  </div>
</div>

  const sW=isUK2US?q.uk:q.us;
  const mB=isUK2US?"#1a3a6b":"#8B1A1A";
  const oH=q.opts.map((o,i)=>`<button class="opt" id="o${i}" onclick="choose(${i})" style="background:${t.bg};border-color:${t.border}"><span class="opt-key" style="background:${t.keyBg};color:${t.key}">${String.fromCharCode(65+i)}</span><span class="opt-word">${o}</span></button>`).join("");
  document.getElementById("qa").innerHTML=`<div class="q-card" style="background:${t.bg};border-color:${t.border}"><div class="q-header"><span class="q-tag" style="color:${t.tag};border-color:${t.tag};background:${t.tagBg}">Question ${cur+1}</span><span class="q-mode-badge" style="background:${mB}">${fF}&rarr;${tF} ${tL}</span></div><div class="q-prompt">${fL}:</div><div class="q-word-box" style="border-color:${t.border}"><span class="q-flag">${fF}</span><span class="q-word" style="color:${t.tag}">${sW}</span><button class="speak-btn" onclick="playAudio('${fAK}')" title="Listen">&#x1F50A;</button></div><div class="q-ask">${tF} What's the ${tL} word?</div><div class="opts">${oH}</div><div class="fb" id="fb"></div></div>`;
  const nb=document.getElementById("nxt");
  nb.style.display="none";
  nb.style.background=t.tag;
  answered=false;
}

function choose(i){
  if(answered)return;
  answered=true;
  const q=QS[cur];
  const isUK2US=q.mode==="uk2us";
  const cW=isUK2US?q.us:q.uk;
  const cAK=isUK2US?q.usKey:q.ukKey;
  const cF=isUK2US?"&#x1F1FA;&#x1F1F8;":"&#x1F1EC;&#x1F1E7;";
  const tL=isUK2US?"American":"British";
  for(let j=0;j<q.opts.length;j++){
    const b=document.getElementById("o"+j);
    b.disabled=true;
    if(j===q.ans)b.classList.add("correct-answer");
    else if(j===i)b.classList.add("wrong-answer");
  }
  playAudio(cAK);
  const fb=document.getElementById("fb");
  if(i===q.ans){
    score++;
    document.getElementById("slbl").textContent=score+" pts";
    fb.className="fb show ok";
    fb.innerHTML=`<strong>${rnd(CHEERS_OK)}</strong> ${q.hint}<br><button class="fb-speak ok-speak" onclick="playAudio('${cAK}')">&#x1F50A; Hear again: <em>${cW}</em> ${cF}</button>`;
  }else{
    fb.className="fb show err";
    fb.innerHTML=`<strong>${rnd(CHEERS_ERR)}</strong> ${q.hint}<br><button class="fb-speak err-speak" onclick="playAudio('${cAK}')">&#x1F50A; Hear correct word: <em>${cW}</em></button>`;
  }
  document.getElementById("nxt").style.display="inline-block";
}

function next(){cur++;render();}

function drawStars(n){
  let h="";
  for(let i=0;i<5;i++){const f=i<n;h+=`<svg class="star" viewBox="0 0 34 34"><polygon points="17,3 21,13 32,13 23,20 26,31 17,25 8,31 11,20 2,13 13,13" fill="${f?"#FFD700":"rgba(255,255,255,0.3)"}" stroke="${f?"#FFD700":"rgba(255,255,255,0.4)"}" stroke-width="1.5"/></svg>`;}
  return h;
}

function showScore(){
  const pct=score/QS.length;
  const e=pct>=1?ENDINGS.perfect:pct>=.75?ENDINGS.great:pct>=.5?ENDINGS.good:ENDINGS.keep_going;
  document.getElementById("qa").innerHTML=`<div class="score-wrap"><div class="score-banner" style="background:${e.bg};border-color:${e.border}"><div class="score-flags">&#x1F1EC;&#x1F1E7; &#x1F1FA;&#x1F1F8;</div><div class="score-headline">${e.headline}</div><div class="score-subhead">${e.subhead}</div><div class="score-stars">${drawStars(e.stars)}</div><div class="score-ring"><span class="score-big">${score}</span><span class="score-of">/ ${QS.length} pont</span></div><div class="praise-box">${e.praises.map(p=>`<div class="praise-line">${p}</div>`).join("")}</div><div class="score-nudge">${e.nudge}</div><button class="restart" onclick="restart()">Újra megpróbálom! &#x1F3AF;</button></div></div>`;
  document.getElementById("nxt").style.display="none";
}

function restart(){cur=0;score=0;render();}
render();
</script>
</body>
</html>
